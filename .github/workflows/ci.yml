name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  supabase-schema:
    name: Supabase migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase and apply migrations
        run: |
          supabase start -x studio,imgproxy,logflare,vector,supavisor
          supabase db reset

      - name: Check generated types match schema
        run: node scripts/check-database-types.mjs

  storefront:
    name: Storefront
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Lint
        run: pnpm --filter @jeyjo/storefront lint

      - name: Typecheck
        run: pnpm --filter @jeyjo/storefront typecheck

      - name: Build
        run: pnpm --filter @jeyjo/storefront build

  cms:
    name: CMS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: ERP ports typecheck
        run: pnpm --filter @jeyjo/erp-ports typecheck

      - name: ERP ports tests
        run: pnpm --filter @jeyjo/erp-ports test

      - name: Lint
        run: pnpm --filter @jeyjo/cms lint
        continue-on-error: true
        # Deuda: ESLint flat config del template ecommerce falla al hoistear en monorepo; se corrige en cambio cms dedicado.

      - name: Typecheck
        run: pnpm --filter @jeyjo/cms typecheck

      - name: Build
        if: ${{ secrets.DATABASE_URL != '' }}
        run: pnpm --filter @jeyjo/cms build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ci-payload-secret-min-32-chars-long

      - name: Build skipped (no DATABASE_URL)
        if: ${{ secrets.DATABASE_URL == '' }}
        run: echo "CMS production build skipped — set DATABASE_URL secret to enable."
